global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

defaults
	log	global
	mode	tcp
	option	tcplog
        timeout connect 5000
        timeout client  50000
        timeout server  50000
	errorfile 400 /etc/haproxy/errors/400.http
	errorfile 403 /etc/haproxy/errors/403.http
	errorfile 408 /etc/haproxy/errors/408.http
	errorfile 500 /etc/haproxy/errors/500.http
	errorfile 502 /etc/haproxy/errors/502.http
	errorfile 503 /etc/haproxy/errors/503.http
	errorfile 504 /etc/haproxy/errors/504.http

listen stats  # веб-страница со статистикой
        bind                    :888
        mode                    http
        stats                   enable
        stats uri               /stats
        stats refresh           5s
        stats realm             Haproxy\ Statistics

frontend http_in
	mode	http
	bind	:8080
	acl example_local hdr(host) -i example.local
	use_backend weight_server if example_local
	default_backend no_access

# Бэкэнд с весами
backend weight_server
	mode http
	balance roundrobin

	server s1 127.0.0.1:8888 weight 2 check inter 3s fall 2 rise 2
	server s2 127.0.0.1:9999 weight 3 check inter 3s fall 2 rise 2
	server s3 127.0.0.1:8899 weight 4 check inter 3s fall 2 rise 2

# Бэкэнд если не еxample.local
backend no_access
	mode http
	http-request deny deny_status 403



